# ABTWREN Sidecar Timing Distribution Configuration
#
# Transmitter (mkdev30): reads WREN PCIe ring, forwards events via transport
# Receiver    (mkdev16): receives events via transport, two-thread SPSC arch
#
# Valid transports: "packet_mmap" | "af_xdp" | "intel_i210" | "cadence_gem"

[general]
ether_type   = 0x88B5
watchdog_sec = 30
nic_tuner    = "nfs_safe"               # "off" | "nfs_safe" | "full"

[transmitter]
transport     = "packet_mmap"
interface     = "eno3"
driver        = ""
mac           = "d4:f5:27:2a:a9:58"   # cfc-865-mkdev30 eno2
cpu_core      = 4
ctim_enabled  = false                     # set up WREN CTIM conditions/actions at startup

[receiver]
transport         = "packet_mmap"
interface         = "end0"
driver            = ""
mac               = "fc:0f:e7:1b:8b:55"   # cfc-865-mkdev16 eno2
poller_core       = 1
processor_core    = 2
queue_capacity    = 32
ltim_event_id     = 0                     # LTIM event id to trigger on (0 = disabled)
ltim_channel      = 0                     # LTIM pulser channel to match
ltim_pulse_width_us = 1000                # square-pulse width in microseconds

[packet_mmap]
block_size   = 4096
block_number = 64

[af_xdp]
umem_frame_size = 4096
frame_count     = 64
need_wakeup     = true

# ── MAC reference ─────────────────────────────────────────────────────────
# mkdev16: eno1=20:87:56:b6:6a:27  eno2=20:87:56:b6:33:67  eno3=20:87:56:b6:33:68
# mkdev30: eno1=d4:f5:27:2a:69:f1  eno2=d4:f5:27:2a:a9:59  eno3=d4:f5:27:2a:a9:58
# mkdev50: end0=fc:0f:e7:1b:8b:55
